spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/docanalyzer
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

app:
  storage:
    # Local disk storage — swap for Azure Blob config later
    upload-dir: ${UPLOAD_DIR:./uploads}
  ai:
    provider: ${AI_PROVIDER:ollama}   # "ollama" or "anthropic"
    connect-timeout: ${AI_CONNECT_TIMEOUT:10s}
    response-timeout: ${AI_RESPONSE_TIMEOUT:2m}
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llava}       # vision model for images
      text-model: ${OLLAMA_TEXT_MODEL:llama3}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-6
