spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/docanalyzer
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

app:
  auth:
    # Email of the user every request currently runs as. Phase 1 has no
    # login flow — once real auth lands, CurrentUserProvider will read
    # from SecurityContextHolder instead.
    default-user-email: ${DEFAULT_USER_EMAIL:local@docanalyzer}
  cors:
    # Comma-separated list. Defaults to the Vite dev server.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    # Local disk storage — swap for Azure Blob config later
    upload-dir: ${UPLOAD_DIR:./uploads}
  ai:
    provider: ${AI_PROVIDER:ollama}   # "ollama" or "anthropic"
    connect-timeout: ${AI_CONNECT_TIMEOUT:10s}
    response-timeout: ${AI_RESPONSE_TIMEOUT:2m}
    chunking:
      # Below threshold-chars: one single LLM call (today's behavior).
      # Above: split into chunk-size-chars windows with overlap-chars overlap,
      # summarise each part, then merge.
      threshold-chars: ${CHUNK_THRESHOLD_CHARS:20000}
      chunk-size-chars: ${CHUNK_SIZE_CHARS:6000}
      overlap-chars: ${CHUNK_OVERLAP_CHARS:200}
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llava}       # vision model for images
      text-model: ${OLLAMA_TEXT_MODEL:llama3}
    anthropic:
      base-url: ${ANTHROPIC_URL:https://api.anthropic.com}
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-6
